<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" version="1.1" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5e81ac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81a1c1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="url(#grad1)" stroke="#4c566a" stroke-width="2"/>
  
  <!-- Gear/settings icon -->
  <g transform="translate(64,64)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="12" fill="#eceff4" stroke="#4c566a" stroke-width="2"/>
    
    <!-- Gear teeth -->
    <g fill="#eceff4" stroke="#4c566a" stroke-width="1.5">
      <rect x="-6" y="-32" width="12" height="10" rx="2"/>
      <rect x="-6" y="22" width="12" height="10" rx="2"/>
      <rect x="-32" y="-6" width="10" height="12" rx="2"/>
      <rect x="22" y="-6" width="10" height="12" rx="2"/>
      
      <rect x="-24" y="-24" width="10" height="10" rx="2" transform="rotate(45)"/>
      <rect x="14" y="-24" width="10" height="10" rx="2" transform="rotate(45)"/>
      <rect x="-24" y="14" width="10" height="10" rx="2" transform="rotate(45)"/>
      <rect x="14" y="14" width="10" height="10" rx="2" transform="rotate(45)"/>
    </g>
  </g>
  
  <!-- Small drift indicator (curved arrow) -->
  <path d="M 24 100 Q 32 92, 40 100" fill="none" stroke="#88c0d0" stroke-width="3" stroke-linecap="round"/>
  <path d="M 40 100 L 36 96 M 40 100 L 36 104" fill="none" stroke="#88c0d0" stroke-width="3" stroke-linecap="round"/>
</svg>
