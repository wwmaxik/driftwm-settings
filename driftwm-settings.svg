<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" version="1.1" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Window representation -->
  <g transform="translate(64, 50)">
    <!-- Main window -->
    <rect x="-28" y="-20" width="56" height="40" rx="4" fill="#ffffff" opacity="0.95" stroke="#ffffff" stroke-width="1"/>
    
    <!-- Window titlebar -->
    <rect x="-28" y="-20" width="56" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
    
    <!-- Window dots -->
    <circle cx="-22" cy="-16" r="1.5" fill="#667eea" opacity="0.6"/>
    <circle cx="-17" cy="-16" r="1.5" fill="#667eea" opacity="0.6"/>
    <circle cx="-12" cy="-16" r="1.5" fill="#667eea" opacity="0.6"/>
  </g>
  
  <!-- Sliders/settings controls -->
  <g transform="translate(64, 50)">
    <!-- Slider 1 -->
    <line x1="-18" y1="-6" x2="18" y2="-6" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="8" cy="-6" r="3" fill="#667eea"/>
    
    <!-- Slider 2 -->
    <line x1="-18" y1="2" x2="18" y2="2" stroke="#764ba2" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="-4" cy="2" r="3" fill="#764ba2"/>
    
    <!-- Slider 3 -->
    <line x1="-18" y1="10" x2="18" y2="10" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="12" cy="10" r="3" fill="#667eea"/>
  </g>
  
  <!-- Floating elements (drift effect) -->
  <circle cx="24" cy="32" r="3" fill="#ffffff" opacity="0.4"/>
  <circle cx="104" cy="28" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="96" cy="96" r="3" fill="#ffffff" opacity="0.4"/>
  <circle cx="28" cy="100" r="2" fill="#ffffff" opacity="0.3"/>
</svg>
